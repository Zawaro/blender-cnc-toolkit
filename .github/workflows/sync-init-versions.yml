name: Sync init versions
on:
  push:
    branches:
      - release-please--branches--main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update bl_info version in __init__.py files
        run: |
          VERSION=$(cat version.txt)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          TUPLE="(${MAJOR}, ${MINOR}, ${PATCH})"
          echo "Updating __init__.py files to ${TUPLE}"
          for f in hi_five/__init__.py eevee_next/__init__.py cyclesx/__init__.py; do
            sed -i "s/\"version\": (.*),/\"version\": ${TUPLE},/" "$f"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hi_five/__init__.py eevee_next/__init__.py cyclesx/__init__.py
          git diff --cached --quiet || git commit -m "chore: sync bl_info version with version.txt"
          git push
